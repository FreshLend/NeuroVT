<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroVT</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #05070a;
            --bg-deeper: #020304;
            --bg-card: rgba(8, 12, 20, 0.85);
            --bg-card-solid: #0a0f18;
            --neon-red: #ff003c;
            --neon-red-glow: rgba(255, 0, 60, 0.4);
            --neon-blue: #00f2ff;
            --neon-blue-glow: rgba(0, 242, 255, 0.3);
            --neon-purple: #b000ff;
            --text-main: #e0e6ed;
            --text-dim: #8a9bb5;
            --border-color: #1a2332;
            --border-glow: rgba(0, 242, 255, 0.2);
            --success-neon: #00ff88;
            --warning-neon: #ffaa00;
            --danger-neon: #ff0055;
        }

        body {
            background: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                repeating-linear-gradient(
                    0deg,
                    rgba(0, 242, 255, 0.02) 0px,
                    rgba(0, 242, 255, 0.02) 2px,
                    transparent 2px,
                    transparent 6px
                ),
                repeating-linear-gradient(
                    90deg,
                    rgba(255, 0, 60, 0.02) 0px,
                    rgba(255, 0, 60, 0.02) 2px,
                    transparent 2px,
                    transparent 6px
                ),
                radial-gradient(circle at 20% 30%, rgba(0, 242, 255, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255, 0, 60, 0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .cyber-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(var(--neon-blue-glow) 1px, transparent 1px),
                linear-gradient(90deg, var(--neon-blue-glow) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.05;
            pointer-events: none;
            z-index: 0;
        }

        .main-container {
            position: relative;
            z-index: 1;
            padding: 20px 30px;
        }

        .cyber-frame {
            position: relative;
            border: 1px solid rgba(0, 242, 255, 0.3);
            background: rgba(5, 7, 10, 0.5);
            backdrop-filter: blur(2px);
        }

        .cyber-corner {
            position: absolute;
            width: 50px;
            height: 50px;
            border: 2px solid var(--neon-blue);
            filter: drop-shadow(0 0 8px var(--neon-blue));
        }

        .corner-tl {
            top: -2px;
            left: -2px;
            border-right: none;
            border-bottom: none;
        }

        .corner-br {
            bottom: -2px;
            right: -2px;
            border-left: none;
            border-top: none;
            border-color: var(--neon-red);
            filter: drop-shadow(0 0 8px var(--neon-red));
        }

        .navbar {
            background: rgba(2, 3, 4, 0.95);
            border-bottom: 1px solid var(--neon-blue);
            box-shadow: 0 0 20px var(--neon-blue-glow);
            backdrop-filter: blur(10px);
            padding: 0.8rem 0;
            position: relative;
            z-index: 100;
        }

        .navbar-brand {
            font-family: 'Orbitron', monospace;
            font-weight: 800;
            font-size: 1.5rem;
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent !important;
            text-shadow: none;
            letter-spacing: 2px;
        }

        .navbar-brand i {
            background: none;
            -webkit-background-clip: unset;
            background-clip: unset;
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
        }

        .nav-link {
            color: var(--text-dim) !important;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            margin: 0 5px;
            position: relative;
        }

        .nav-link:hover {
            color: var(--neon-blue) !important;
            text-shadow: 0 0 8px var(--neon-blue);
        }

        .nav-link::before {
            content: '[';
            opacity: 0;
            transition: 0.3s;
        }

        .nav-link::after {
            content: ']';
            opacity: 0;
            transition: 0.3s;
        }

        .nav-link:hover::before,
        .nav-link:hover::after {
            opacity: 1;
            color: var(--neon-red);
        }

        .card {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-left: 3px solid var(--neon-blue);
            border-radius: 0;
            transition: all 0.3s ease;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
        }

        .card:hover {
            border-left-color: var(--neon-red);
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.15);
            transform: translateY(-2px);
        }

        .card-header {
            background: rgba(0, 242, 255, 0.03);
            border-bottom: 1px solid var(--border-color);
            font-family: 'Orbitron', monospace;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 1px;
            color: var(--neon-blue);
            text-transform: uppercase;
            padding: 1rem 1.25rem;
        }

        .card-header i {
            margin-right: 8px;
            color: var(--neon-red);
        }

        .card-body {
            padding: 1.5rem;
        }

        .btn {
            border-radius: 0;
            font-family: 'Orbitron', monospace;
            font-weight: 500;
            letter-spacing: 1px;
            font-size: 0.8rem;
            padding: 0.6rem 1.5rem;
            transition: all 0.3s ease;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: transparent;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
        }

        .btn-primary:hover {
            background: var(--neon-blue);
            color: var(--bg-dark);
            box-shadow: 0 0 15px var(--neon-blue);
            border-color: var(--neon-blue);
        }

        .btn-danger {
            background: transparent;
            border: 1px solid var(--neon-red);
            color: var(--neon-red);
        }

        .btn-danger:hover {
            background: var(--neon-red);
            color: var(--bg-dark);
            box-shadow: 0 0 15px var(--neon-red);
        }

        .btn-success {
            background: transparent;
            border: 1px solid var(--success-neon);
            color: var(--success-neon);
        }

        .btn-success:hover {
            background: var(--success-neon);
            color: var(--bg-dark);
            box-shadow: 0 0 15px var(--success-neon);
        }

        .btn-warning {
            background: transparent;
            border: 1px solid var(--warning-neon);
            color: var(--warning-neon);
        }

        .btn-warning:hover {
            background: var(--warning-neon);
            color: var(--bg-dark);
        }

        .form-label {
            color: var(--neon-blue);
            font-family: 'Orbitron', monospace;
            font-size: 0.75rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .form-control, .form-select {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 0;
            color: var(--text-main) !important;
            font-family: 'Rajdhani', monospace;
            font-size: 0.9rem;
            padding: 0.6rem 1rem;
            transition: all 0.3s ease;
        }

        .form-control:focus, .form-select:focus {
            background: rgba(0, 0, 0, 0.8);
            border-color: var(--neon-blue);
            box-shadow: 0 0 10px var(--neon-blue-glow);
            outline: none;
        }

        .form-control::placeholder {
            color: var(--text-dim);
            font-family: 'Rajdhani', monospace;
        }

        .form-range::-webkit-slider-thumb {
            background: var(--neon-red);
            box-shadow: 0 0 10px var(--neon-red);
        }

        .form-range::-webkit-slider-runnable-track {
            background: var(--border-color);
        }

        .badge {
            font-family: 'Orbitron', monospace;
            letter-spacing: 0.5px;
            border-radius: 0;
            padding: 0.4rem 0.8rem;
        }

        .badge.bg-success {
            background: var(--success-neon) !important;
            color: #000;
        }

        .badge.bg-danger {
            background: var(--danger-neon) !important;
        }

        .badge.bg-warning {
            background: var(--warning-neon) !important;
            color: #000;
        }

        .badge.bg-info {
            background: green !important;
            color: #000;
        }

        .alert {
            border-radius: 0;
            background: rgba(0, 0, 0, 0.8);
            border-left: 4px solid;
            color: var(--text-main);
        }

        .alert-info {
            border-left-color: var(--neon-blue);
            background: rgba(0, 242, 255, 0.05);
        }

        .alert-success {
            border-left-color: var(--success-neon);
            background: rgba(0, 255, 136, 0.05);
        }

        .alert-warning {
            border-left-color: var(--warning-neon);
            background: rgba(255, 170, 0, 0.05);
        }

        .alert-danger {
            border-left-color: var(--danger-neon);
            background: rgba(255, 0, 85, 0.05);
        }

        .nav-tabs {
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-card-solid);
            padding: 0.5rem 0.5rem 0;
            gap: 5px;
        }

        .nav-tabs .nav-link {
            border: none;
            background: transparent;
            color: var(--text-dim) !important;
            font-family: 'Orbitron', monospace;
            font-size: 0.8rem;
            padding: 0.7rem 1.5rem;
            border-radius: 0;
            transition: all 0.3s ease;
        }

        .nav-tabs .nav-link:hover {
            color: var(--neon-blue) !important;
            background: rgba(0, 242, 255, 0.1);
        }

        .nav-tabs .nav-link.active {
            background: linear-gradient(135deg, rgba(0, 242, 255, 0.2), rgba(255, 0, 60, 0.1));
            color: var(--neon-blue) !important;
            border-bottom: 2px solid var(--neon-blue);
        }

        .chat-log {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-color);
            height: 400px;
            overflow-y: auto;
            padding: 1rem;
        }

        .chat-message {
            margin-bottom: 1rem;
            padding: 0.8rem;
            border-left: 3px solid;
            animation: fadeInUp 0.3s ease;
        }

        .chat-message.user {
            border-left-color: var(--neon-blue);
            background: rgba(0, 242, 255, 0.05);
        }

        .chat-message.ai {
            border-left-color: var(--neon-red);
            background: rgba(255, 0, 60, 0.05);
        }

        .list-group-item {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            margin-bottom: 5px;
            transition: all 0.3s ease;
        }

        .list-group-item.active {
            background: rgba(0, 242, 255, 0.15);
            border-left: 3px solid var(--neon-blue);
            color: var(--neon-blue);
        }

        .list-group-item:hover {
            background: rgba(0, 242, 255, 0.1);
            transform: translateX(5px);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 0;
            background: var(--success-neon);
            box-shadow: 0 0 8px var(--success-neon);
            animation: pulse 2s infinite;
            margin-right: 8px;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-deeper);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--neon-blue);
            border-radius: 0;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--neon-red);
        }

        textarea {
            resize: vertical;
            font-family: 'Rajdhani', monospace !important;
        }

        .text-secondary {
            color: var(--text-dim) !important;
        }

        .text-muted {
            color: #5a6e8a !important;
        }

        hr {
            border-color: var(--border-color);
        }

        @media (max-width: 768px) {
            .main-container {
                padding: 10px 15px;
            }
            .nav-tabs .nav-link {
                padding: 0.5rem 0.8rem;
                font-size: 0.7rem;
            }
            .btn {
                padding: 0.4rem 1rem;
                font-size: 0.7rem;
            }
        }
    </style>
    
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="cyber-grid"></div>
    
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-microchip me-2"></i>
                Neuro<span style="color: var(--neon-red);">VT</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">
                            <i class="fas fa-terminal me-1"></i> CORE
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/settings">
                            <i class="fas fa-sliders-h me-1"></i> SETTINGS
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    
    <div class="main-container">
        <div class="cyber-frame" style="position: relative; padding: 0;">
            <div class="cyber-corner corner-tl"></div>
            <div class="cyber-corner corner-br"></div>
            {% block content %}{% endblock %}
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.querySelectorAll('.btn, .nav-link, .card').forEach(el => {
            el.addEventListener('mouseenter', function(e) {
                console.log('cyber element focused');
            });
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
